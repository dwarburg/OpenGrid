services:
  db:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: opengrid-db
    environment:
      - POSTGRES_USER=opengrid
      - POSTGRES_PASSWORD=opengrid123
      - POSTGRES_DB=opengrid
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_db.sh:/docker-entrypoint-initdb.d/init_db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opengrid -d opengrid"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
